<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>智慧商品信息管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="top-bar">
    <h1>🛒 智慧商品信息管理系统</h1>
    <div style="position:absolute; right:24px; top:14px; color:rgba(255,255,255,0.85); font-size:14px;">
        👤 <span sec:authentication="name">admin</span>
        <span sec:authorize="hasRole('admin')" style="margin-left:6px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px;font-size:12px;">管理员</span>
        <a th:href="@{/logout}" style="color:#fff;margin-left:12px;text-decoration:none;">退出</a>
    </div>
</header>
<div class="main-container">
    <nav class="sidebar">
        <ul>
            <li><a th:href="@{/}" target="contentFrame" class="active">🏠 首页</a></li>
            <li><a th:href="@{/product/list}" target="contentFrame">📦 商品管理</a></li>
            <!-- 仅管理员可见 -->
            <li sec:authorize="hasRole('admin')">
                <a th:href="@{/category/list}" target="contentFrame">📂 分类管理</a>
            </li>
            <li sec:authorize="hasRole('admin')">
                <a th:href="@{/product/add}" target="contentFrame">➕ 添加商品</a>
            </li>
            <li><hr></li>
            <li><a th:href="@{/logout}">🚪 退出登录</a></li>
        </ul>
    </nav>
    <main class="content">
        <iframe name="contentFrame" th:src="@{/welcome}" frameborder="0" class="content-frame"></iframe>
    </main>
</div>
</body>
</html>
