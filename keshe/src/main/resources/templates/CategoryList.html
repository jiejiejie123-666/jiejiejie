<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>分类管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .table-container { padding: 20px 30px; max-width: 900px; margin: 0 auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .table-header h2 { color: #333; font-size: 20px; }
        .btn { padding: 8px 18px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #1890ff; color: #fff; }
        .btn-sm { padding: 4px 12px; font-size: 12px; border-radius: 4px; text-decoration: none; display: inline-block; }
        .btn-edit { background: #52c41a; color: #fff; }
        .btn-del { background: #ff4d4f; color: #fff; }
        .msg-tip { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; padding: 10px 16px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        th { background: #fafafa; color: #555; font-weight: 600; }
        tr:hover td { background: #f5f9ff; }
    </style>
</head>
<body>
<div class="table-container">
    <div class="table-header">
        <h2>📂 分类列表</h2>
        <a th:href="@{/category/add}" class="btn btn-primary">+ 添加分类</a>
    </div>
    <div th:if="${msg}" class="msg-tip" th:text="${msg}"></div>
    <table th:if="${categories != null and not categories.isEmpty()}">
        <thead>
            <tr><th>序号</th><th>分类名称</th><th>描述</th><th>操作</th></tr>
        </thead>
        <tbody>
            <tr th:each="c, iterStat : ${categories}">
                <td th:text="${iterStat.count}">1</td>
                <td th:text="${c.name}">数码电子</td>
                <td th:text="${c.descp}">描述</td>
                <td>
                    <a th:href="@{/category/edit/{id}(id=${c.id})}" class="btn btn-sm btn-edit">编辑</a>
                    <a th:href="@{/category/delete/{id}(id=${c.id})}" class="btn btn-sm btn-del"
                       onclick="return confirm('确定删除分类「'+this.getAttribute('data-name')+'」吗？')"
                       th:attr="data-name=${c.name}">删除</a>
                </td>
            </tr>
        </tbody>
    </table>
    <div th:unless="${categories != null and not categories.isEmpty()}" style="text-align:center;padding:40px;color:#999;">暂无分类</div>
</div>
</body>
</html>
