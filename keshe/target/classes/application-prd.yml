# 生产环境配置
server:
  port: 80

spring:
  thymeleaf:
    cache: true

  datasource:
    url: jdbc:mysql://localhost:3306/2024gjh?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
