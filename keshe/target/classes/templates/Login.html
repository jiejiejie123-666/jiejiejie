<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - 智慧商品信息管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
        }
        .login-box {
            background: #fff;
            padding: 40px 36px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 8px;
            color: #1a73e8;
            font-size: 24px;
        }
        .login-box .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .btn-login:hover {
            background: #40a9ff;
        }
        .error-msg {
            background: #fff2f0;
            color: #e74c3c;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            border: 1px solid #ffccc7;
        }
        .hint {
            margin-top: 20px;
            color: #bbb;
            font-size: 12px;
        }
    </style>
</head>
<body class="login-page">
<div class="login-box">
    <h2>🔐 用户登录</h2>
    <p class="subtitle">智慧商品信息管理系统</p>

    <!-- 登录失败提示 -->
    <div th:if="${param.error}" class="error-msg">
        ⚠️ 用户名或密码错误，请重新输入
    </div>
    <!-- 退出成功提示 -->
    <div th:if="${param.logout}" class="error-msg" style="background:#f6ffed;color:#52c41a;border-color:#b7eb8f;">
        ✅ 您已安全退出
    </div>

    <form th:action="@{/login}" method="post">
                        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-login">登 录</button>
    </form>
    <p class="hint">测试账号：admin / 123456 &nbsp;|&nbsp; jinhua / 123456</p>
</div>
</body>
</html>
